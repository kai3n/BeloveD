<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="BeloveD luxury lab-grown diamond jewelry concept store."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;0,6..96,700;1,6..96,400;1,6..96,500;1,6..96,600&family=Outfit:wght@200;300;400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Pinyon+Script&family=Noto+Serif+KR:wght@200;300;400;600&family=Noto+Serif+SC:wght@200;300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <title>BeloveD | Lab Diamond Jewelry</title>
    <script>
      // React 마운트 전에 저장된 테마를 적용 — 하드 로드 시 다크 기본값이
      // 먼저 그려지는 깜빡임(FOUC) 방지. theme.jsx와 같은 키/기본값을 쓴다.
      (function () {
        var theme = "day";
        try {
          if (window.localStorage.getItem("lumina-theme") === "dark") theme = "dark";
        } catch (e) {}
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme === "day" ? "light" : "dark";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BeloveD After Hero Concept 01</title>
    <link rel="stylesheet" href="/mobile-concepts/after-hero.css" />
  </head>
  <body>
    <main class="phone">
      <section class="demo-hero" aria-label="Current BeloveD hero">
        <video autoplay muted loop playsinline poster="/assets/diamond-hero-white-poster.webp">
          <source src="/assets/diamond-hero-white.mp4" type="video/mp4" />
        </video>
        <div class="hero-top">
          <button class="hero-icon" aria-label="Open menu"><span></span></button>
          <div class="brand">BeloveD</div>
          <button class="hero-icon hero-bag" aria-label="Open bag">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.5 8.5h11l.9 11H5.6l.9-11Z" />
              <path d="M9 8.5V7a3 3 0 0 1 6 0v1.5" />
            </svg>
          </button>
        </div>
        <div class="hero-copy">
          <h1>PERFECTION,<br /><em>grown.</em></h1>
          <p>Lab-grown brilliance, cut to desire.</p>
          <div class="hero-actions">
            <a href="#after">Start custom order</a>
            <a class="secondary" href="#after">Explore designs</a>
          </div>
        </div>
        <a class="scroll-cue" href="#after">Scroll for mobile UI <span>↓</span></a>
      </section>

      <section class="after" id="after" aria-label="After hero category dock concept">
        <div class="after-head">
          <div>
            <p class="after-label">Concept 01</p>
            <h1>Choose the piece.</h1>
            <p class="after-note">Four paths. No long explanation.</p>
          </div>
          <a class="skip-link" href="#">All</a>
        </div>

        <div class="category-dock">
          <a class="category" href="#">
            <img src="/assets/lineup-ring.png" alt="Ring design" />
            <strong>Rings</strong>
            <small>4 designs</small>
          </a>
          <a class="category" href="#">
            <img src="/assets/lineup-studs.png" alt="Earring design" />
            <strong>Earrings</strong>
            <small>4 designs</small>
          </a>
          <a class="category" href="#">
            <img src="/assets/lineup-bracelet.png" alt="Bracelet design" />
            <strong>Bracelets</strong>
            <small>4 designs</small>
          </a>
          <a class="category" href="#">
            <img src="/assets/lineup-pendant.png" alt="Necklace design" />
            <strong>Necklaces</strong>
            <small>4 designs</small>
          </a>
        </div>

        <div class="bottom-bar">
          <a class="primary-action" href="#">Start custom order</a>
        </div>
      </section>
    </main>
  </body>
</html>

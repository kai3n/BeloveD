<title>Option 3 — Story Rail · BeloveD Review Concepts</title>
<link rel="stylesheet" href="../intake-concepts/intake-concepts.css" />
<style>
  main { width: min(100%, 1240px); margin: 0 auto; padding: 46px 20px 90px; }
  .sect-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
  .sect-head h1 { font-family: var(--serif); font-weight: 500; font-size: clamp(30px, 5vw, 46px); margin: 8px 0 0; }
  .agg { display: flex; align-items: baseline; gap: 12px; color: var(--muted); font-size: 13px; }
  .agg strong { font-family: var(--serif); font-size: 24px; color: var(--gold-strong); }
  .stars { color: var(--gold); letter-spacing: 3px; }

  /* 스토리 레일 — 9:16 세로 카드 가로 스크롤 (모바일 네이티브 감각) */
  .rail { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 14px; scrollbar-width: thin; scroll-snap-type: x mandatory; }
  .story { flex: 0 0 240px; scroll-snap-align: start; position: relative; aspect-ratio: 9 / 15; overflow: hidden; border: 1px solid var(--line); background: #0b0b0d; cursor: pointer; }
  .story img, .story video { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
  .story:hover img, .story:hover video { transform: scale(1.05); }
  .story .band {
    position: absolute; inset: auto 0 0 0; padding: 40px 14px 14px;
    background: linear-gradient(180deg, transparent, rgba(3,3,4,0.88) 60%);
    display: grid; gap: 3px;
  }
  .story .band .stars { font-size: 10.5px; }
  .story .band q { font-family: var(--serif); font-size: 14.5px; line-height: 1.3; quotes: "“" "”"; }
  .story .band .who { font-size: 10.5px; color: var(--muted); letter-spacing: 0.06em; }
  .story .band .who b { color: var(--gold-strong); }
  .verified { display: inline-flex; align-items: center; gap: 4px; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); }
  .verified::before { content: "✓"; width: 12px; height: 12px; display: inline-grid; place-items: center; border: 1px solid var(--gold-dim); border-radius: 50%; font-size: 7px; }
  .story .play { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; font-size: 9px; color: var(--gold-strong); background: rgba(3,3,4,0.6); border: 1px solid var(--gold-dim); }

  /* 마지막 카드: 리뷰 남기기 CTA — 미디어 업로드 퍼스트 */
  .story.submit { display: grid; place-items: center; border: 1px dashed var(--gold-dim); background: rgba(214,197,160,0.04); }
  .story.submit .inner { text-align: center; padding: 20px; display: grid; gap: 10px; justify-items: center; }
  .story.submit .plus { width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--gold-dim); display: grid; place-items: center; font-size: 20px; color: var(--gold-strong); }
  .story.submit strong { font-family: var(--serif); font-size: 19px; font-weight: 500; }
  .story.submit small { color: var(--quiet); font-size: 11px; line-height: 1.5; }
</style>
</head>
